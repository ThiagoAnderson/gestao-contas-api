services:
  db:
    image: postgres:16
    restart: always
    shm_size: 128mb
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - 5432:5432


  adminer:
    image: adminer
    restart: always
    ports:
      - 9090:8080


volumes:
  db_data:
